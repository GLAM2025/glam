    TransformerHiddenDim: 256
    TransformerNumLayers: 2
    TransformerNumHeads: 8

  Agent:
    NumLayers: 2
    HiddenDim: 512
    Gamma: 0.985
    Lambda: 0.95
    EntropyCoef: 0.0003